name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --silent

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test
