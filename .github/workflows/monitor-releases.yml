name: Monitor Foundry Releases

on:
  schedule:
    - cron: '23 4 * * *' # Daily at 4:23 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Latest Version
        id: fetch-version
        run: |
          # Simple scrape of the releases page
          LATEST=$(curl -s https://foundryvtt.com/releases/ | grep -oP 'Version \d+\.\d+' | head -1 | awk '{print $2}')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          
      - name: Check if already verified
        id: check-verified
        run: |
          LATEST="${{ steps.fetch-version.outputs.latest }}"
          if grep -q "\"version\": \"$LATEST\"" verified-versions.json; then
            echo "new_version=false" >> $GITHUB_OUTPUT
          else
            echo "new_version=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Create Issue if New Version Detected
        if: steps.check-verified.outputs.new_version == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.fetch-version.outputs.latest }}";
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Verification Required: FoundryVTT ${version}`,
              body: `A new version of FoundryVTT (${version}) has been detected. 
              
              Please perform local verification:
              1. Pull latest changes.
              2. Run \`npm run verify:local\`.
              3. Update \`verified-versions.json\` and commit.`,
              labels: ['verification-required']
            });
