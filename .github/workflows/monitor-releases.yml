name: Monitor Releases

on:
  schedule:
    - cron: "23 4 * * *" # Daily at 4:23 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Run Monitor Script
        run: npx tsx scripts/monitor-releases.ts

      - name: Commit Changes
        id: commit
        run: |
          if git diff --exit-code verified-versions.json; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add verified-versions.json
            git commit -m "chore(registry): update pending verification matrix"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Issues for Pending
        if: steps.commit.outputs.updated == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const registry = JSON.parse(fs.readFileSync('verified-versions.json', 'utf8'));
            const pending = registry.filter(e => e.status === 'pending');

            for (const entry of pending) {
                const title = `Verification Required: FVTT ${entry.fvtt} + ${entry.system} v${entry.systemVersion}`;
                
                // Check if issue already exists
                const issues = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  labels: 'verification-required'
                });
                
                if (!issues.data.some(i => i.title === title)) {
                  await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: title,
                    body: `A new compatibility stack has been added to the pending list.\n\n**FVTT:** ${entry.fvtt}\n**System:** ${entry.system} v${entry.systemVersion}\n\nPlease run:\n\`npm run verify:local -- --docker --all-pending\``,
                    labels: ['verification-required']
                  });
                }
            }
